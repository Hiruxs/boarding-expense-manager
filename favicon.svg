           C 68 53.5 65 49.8 60.5 48.5
           C 64 47 66 43.5 66 39
           C 66 32.5 61 30 54 30
           Z
           M 42 37 L 53 37 C 56.5 37 58 39 58 42 C 58 45 56.5 47 53 47 L 42 47 Z
           M 42 53 L 54 53 C 58 53 60 55 60 58.5 C 60 62 58 63.5 54 63.5 L 42 63.5 Z"
        fill="#fafafa"/>

  <!-- Red notification dot -->
  <circle cx="74" cy="30" r="6" fill="#dc2626"/>
